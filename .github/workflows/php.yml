name: Lion-Framework (CI Workflow)

on:
  push:
    branches:
      - actions
  pull_request:
    branches:
      - main
  schedule:
    - cron: "15 0 * * *"

jobs:
  composer-validation:
    runs-on: ubuntu-latest
    name: Composer Validation

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, gd, zip

      - name: Composer Validate
        run: composer validate --strict

      - name: Composer Check for vulnerabilities
        run: composer audit --locked

      - name: Composer Install
        run: composer install

      - name: Composer Dump-Autoload
        run: composer dump-autoload --optimize --strict-psr

  docker-validation:
    runs-on: ubuntu-latest
    name: Docker Validation

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Validate Docker Compose configuration
        run: docker compose config

  code-analyze:
    runs-on: ubuntu-latest
    name: PHP Code Analyze
    needs:
      - composer-validation
      - docker-validation

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, gd, zip

      - name: Composer Install
        run: composer install

      - name: PHP CodeSnifer (App)
        run: php vendor/bin/phpcs --standard=PSR12 app/

      - name: PHPStan (App)
        run: php -d memory_limit=-1 vendor/bin/phpstan analyse app

      - name: PHP CodeSnifer (Database)
        run: php vendor/bin/phpcs --standard=PSR12 database/

      - name: PHPStan (Database)
        run: php -d memory_limit=-1 vendor/bin/phpstan analyse database

      - name: PHP CodeSnifer (Tests)
        run: php vendor/bin/phpcs --standard=PSR12 --ignore=tests/build/\*,tests/bootstrap.php --colors tests/

      - name: PHPStan (Tests)
        run: php -d memory_limit=-1 vendor/bin/phpstan analyse tests

  tests:
    runs-on: ubuntu-latest
    name: PHP Tests
    needs: code-analyze

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Stop MySQL
        run: sudo systemctl stop mysql

      - name: Tear down containers
        run: docker compose down --volumes --remove-orphans

      - name: Stop running Docker containers (if any)
        run: |
          docker ps -q | xargs -r docker stop
          docker ps -aq | xargs -r docker rm

      - name: Copy .env.example to .env
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo ".env.example not found! Please make sure the file exists."
            exit 1
          fi

      - name: Build the Docker image
        run: docker build -t framework-app .

      - name: Start services using Docker Compose
        run: |
          docker compose -f docker-compose.yml up -d
        env:
          COMPOSE_PROJECT_NAME: framework

      - name: Wait for MySQL to be ready
        run: |
          until docker exec framework-mysql mysqladmin --user=root --password=lion --host "localhost" ping --silent; do
            echo "Waiting for MySQL to be available..."
            sleep 3
          done

      - name: Wait for Redis to be ready
        run: |
          until docker exec framework-redis redis-cli ping; do
            echo "Waiting for Redis to be available..."
            sleep 3
          done

      - name: Install Composer dependencies
        run: docker exec framework-app composer install

      - name: Generate RSA Key's
        run: docker exec framework-app php lion new:rsa

      - name: Run PHP tests
        run: docker exec framework-app php lion test

      - name: Tear down containers
        run: docker compose down --volumes --remove-orphans
